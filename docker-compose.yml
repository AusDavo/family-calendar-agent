services:
  memory-db:
    image: pgvector/pgvector:pg17
    container_name: calendar-bot-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - calendar-bot-memory-pgdata:/var/lib/postgresql/data
      - ../mcp-memory-server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  memory-server:
    build: ../mcp-memory-server
    container_name: calendar-bot-memory-server
    restart: unless-stopped
    depends_on:
      memory-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_API_KEY: ${MCP_API_KEY}

  bot:
    build: .
    container_name: family-calendar-agent
    restart: unless-stopped
    depends_on:
      - memory-server
    env_file:
      - .env

volumes:
  calendar-bot-memory-pgdata:
